<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="icon-mi-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#E9AB34"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1A1A1A"/>

  <!-- MI degradation curve (descending, scaled up) -->
  <path d="M 80 112 C 112 112, 144 120, 176 136 C 208 152, 240 192, 272 240 C 304 288, 336 344, 368 376 C 400 408, 416 416, 432 424"
        stroke="url(#icon-mi-grad)" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Echo line -->
  <path d="M 80 144 C 112 144, 144 152, 176 168 C 208 184, 240 224, 272 272 C 304 320, 336 376, 368 404 C 400 428, 416 436, 432 440"
        stroke="url(#icon-mi-grad)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- Cursor dot (amber, inflection) -->
  <circle cx="272" cy="240" r="28" fill="#E9AB34"/>
  <circle cx="272" cy="240" r="48" fill="#E9AB34" opacity="0.12"/>

  <!-- Peak marker (green) -->
  <circle cx="80" cy="112" r="16" fill="#22C55E" opacity="0.6"/>

  <!-- Baseline -->
  <line x1="80" y1="444" x2="432" y2="444" stroke="#8B7D6B" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
