<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="mi-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#E9AB34"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1A1A1A"/>

  <!-- MI degradation curve: descending from top-left (peak quality) to bottom-right (degraded) -->
  <path d="M 10 14 C 14 14, 18 15, 22 17 C 26 19, 30 24, 34 30 C 38 36, 42 43, 46 47 C 50 51, 52 52, 54 53"
        stroke="url(#mi-grad)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Echo line (depth) -->
  <path d="M 10 18 C 14 18, 18 19, 22 21 C 26 23, 30 28, 34 34 C 38 40, 42 47, 46 51 C 50 54, 52 55, 54 56"
        stroke="url(#mi-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- Cursor dot at the inflection point (amber zone — "you are here") -->
  <circle cx="34" cy="30" r="3.5" fill="#E9AB34"/>
  <circle cx="34" cy="30" r="6" fill="#E9AB34" opacity="0.15"/>

  <!-- Peak marker (green dot at start — model at its best) -->
  <circle cx="10" cy="14" r="2" fill="#22C55E" opacity="0.7"/>

  <!-- Baseline -->
  <line x1="10" y1="56" x2="54" y2="56" stroke="#8B7D6B" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
</svg>
