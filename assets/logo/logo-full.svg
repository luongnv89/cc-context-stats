<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" width="360" height="72">
  <defs>
    <linearGradient id="full-mi-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#E9AB34"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="360" height="72" rx="14" fill="#1A1A1A"/>

  <!-- Mark: MI degradation curve (descending) -->
  <g transform="translate(8, 4)">
    <!-- MI curve: descending from peak quality to degraded -->
    <path d="M 10 14 C 14 14, 18 15, 22 17 C 26 19, 30 24, 34 30 C 38 36, 42 43, 46 47 C 50 51, 52 52, 54 53"
          stroke="url(#full-mi-grad)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Echo line -->
    <path d="M 10 18 C 14 18, 18 19, 22 21 C 26 23, 30 28, 34 34 C 38 40, 42 47, 46 51 C 50 54, 52 55, 54 56"
          stroke="url(#full-mi-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>

    <!-- Cursor dot (amber — inflection point) -->
    <circle cx="34" cy="30" r="3.5" fill="#E9AB34"/>
    <circle cx="34" cy="30" r="6" fill="#E9AB34" opacity="0.15"/>

    <!-- Peak marker -->
    <circle cx="10" cy="14" r="2" fill="#22C55E" opacity="0.7"/>

    <!-- Baseline -->
    <line x1="10" y1="56" x2="54" y2="56" stroke="#8B7D6B" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Divider -->
  <line x1="76" y1="16" x2="76" y2="56" stroke="#8B7D6B" stroke-width="1" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="90" y="35" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="-0.3">cc-context</text>
  <text x="90" y="55" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="15" font-weight="500" fill="#E9AB34" letter-spacing="3">stats</text>

  <!-- Right accent bar -->
  <rect x="348" y="20" width="2" height="32" rx="1" fill="#E9AB34" opacity="0.5"/>
</svg>
